<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Masters Pool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #006747;
      --dark-green: #004d36;
      --deeper:     #003326;
      --gold:       #c9a84c;
      --gold-light: #e8c96a;
      --red:        #e05555;
      --blue:       #74b9f5;
      --card-bg:    rgba(255,255,255,0.07);
      --border:     rgba(255,255,255,0.09);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--deeper);
      color: #fff;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: #ffffff;
      border-bottom: 3px solid var(--gold);
      padding: 22px 20px 14px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .header-logo { height: 90px; width: auto; margin-bottom: 8px; display: block; margin-left: auto; margin-right: auto; }
    .header-flag { font-size: 1.6rem; margin-bottom: 4px; }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--gold);
      letter-spacing: 8px;
      text-transform: uppercase;
    }

    .header-sub {
      font-size: 0.7rem;
      color: var(--green);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .refresh-bar {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 0.72rem;
      color: rgba(0,0,0,0.45);
    }

    .refresh-btn {
      background: var(--gold);
      color: var(--dark-green);
      border: none;
      padding: 4px 14px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: var(--gold-light); }

    /* ── STATUS TICKER ── */
    .status-bar {
      background: rgba(0,0,0,0.3);
      text-align: center;
      padding: 7px 16px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    /* ── MAIN ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px 14px 40px;
    }

    /* ── PRE-TOURNAMENT BANNER ── */
    .pre-banner {
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 10px;
      padding: 18px 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    .pre-banner .icon { font-size: 1.6rem; margin-bottom: 6px; }
    .pre-banner h3 { color: var(--gold); font-size: 1rem; margin-bottom: 4px; }
    .pre-banner p  { font-size: 0.78rem; color: rgba(255,255,255,0.55); }

    /* ── TABLE HEADER ── */
    .table-header {
      display: grid;
      grid-template-columns: 44px 1fr 72px 100px;
      padding: 6px 16px;
      font-size: 0.62rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      border-bottom: 1px solid rgba(201,168,76,0.25);
      margin-bottom: 6px;
    }
    .table-header div:nth-child(3),
    .table-header div:nth-child(4) { text-align: right; }

    /* ── PARTICIPANT CARD ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 7px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: rgba(255,255,255,0.18); }
    .card.leader { border-color: var(--gold); background: rgba(201,168,76,0.1); }
    .card.eliminated { background: rgba(180,40,40,0.12); border-color: rgba(180,40,40,0.25); opacity: 0.75; }

    .card-row {
      display: grid;
      grid-template-columns: 44px 1fr 72px 100px;
      align-items: center;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }

    .pos {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--gold);
    }

    .pname {
      font-size: 0.98rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .out-badge {
      font-size: 0.58rem;
      background: var(--red);
      color: #fff;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 1px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .pending-badge {
      font-size: 0.58rem;
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 1px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .score-total {
      text-align: right;
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
    }
    .score-total.under { color: var(--red); }
    .score-total.over  { color: var(--blue); }
    .score-total.even  { color: #fff; }
    .score-total.out   { color: rgba(255,255,255,0.3); font-size: 1rem; }
    .score-total.dash  { color: rgba(255,255,255,0.3); font-size: 1rem; }

    .cut-detail {
      text-align: right;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
    }

    /* ── GOLFER LIST ── */
    .golfer-list { display: none; border-top: 1px solid rgba(255,255,255,0.07); }
    .golfer-list.open { display: block; }

    .golfer-list-header {
      display: grid;
      grid-template-columns: 20px 1fr 58px 58px 70px;
      padding: 6px 16px 5px 52px;
      font-size: 0.6rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .golfer-list-header div:nth-child(3),
    .golfer-list-header div:nth-child(4),
    .golfer-list-header div:nth-child(5) { text-align: right; }

    .golfer-row {
      display: grid;
      grid-template-columns: 20px 1fr 58px 58px 70px;
      align-items: center;
      padding: 9px 16px 9px 52px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 0.83rem;
      transition: background 0.15s;
    }
    .golfer-row:last-child { border-bottom: none; }
    .golfer-row.counted { background: rgba(201,168,76,0.07); }
    .golfer-row.cut-row { opacity: 0.38; }

    .g-check { font-size: 0.78rem; }
    .g-name  { font-weight: 400; display: flex; align-items: center; gap: 8px; }
    .g-headshot {
      width: 30px; height: 30px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.15);
      flex-shrink: 0;
      background: rgba(255,255,255,0.08);
    }
    .g-name-text { display: flex; flex-direction: column; }
    .g-thru { font-size: 0.62rem; color: rgba(255,255,255,0.4); margin-top: 1px; }

    .g-score { text-align: right; font-weight: 600; }
    .g-score.under { color: var(--red); }
    .g-score.over  { color: var(--blue); }

    .g-pos    { text-align: right; color: rgba(255,255,255,0.4); font-size: 0.72rem; }

    .g-status { text-align: right; font-size: 0.62rem; letter-spacing: 1px; text-transform: uppercase; }
    .g-status.cut    { color: var(--red); }
    .g-status.active { color: #4ade80; }
    .g-status.fin    { color: rgba(255,255,255,0.35); }
    .g-status.pre    { color: rgba(255,255,255,0.25); }

    .g-rounds {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.38);
      margin-top: 3px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .g-rounds span { white-space: nowrap; }
    .g-rounds .r-val { font-weight: 600; color: rgba(255,255,255,0.6); }
    .g-rounds .r-val.under { color: var(--red); }
    .g-rounds .r-val.over  { color: var(--blue); }
    .g-rounds .tee-time { color: #60a5fa; }

    .pending-row {
      padding: 9px 16px 9px 52px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.28);
      font-style: italic;
    }

    .broadcast-bar {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 12px;
    }
    .broadcast-bar .bc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .broadcast-bar .bc-round {
      font-size: 0.68rem;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .broadcast-bar .bc-upcoming-label {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
    }
    .bc-blocks {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .bc-block {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      opacity: 0.5;
      transition: all 0.2s;
    }
    .bc-block.active {
      background: rgba(201,168,76,0.1);
      border-color: rgba(201,168,76,0.35);
      opacity: 1;
    }
    .bc-block.done {
      opacity: 0.25;
    }
    .bc-block .bc-network {
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
    }
    .bc-block.active .bc-network { color: var(--gold); }
    .bc-block .bc-time {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      text-align: right;
    }
    .bc-block.active .bc-time { color: rgba(255,255,255,0.8); }
    .bc-live-badge {
      font-size: 0.58rem;
      background: var(--red);
      color: #fff;
      padding: 2px 7px;
      border-radius: 3px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      animation: pulse 2s infinite;
      margin-left: 8px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .watch-live-btn {
      display: block;
      width: 100%;
      text-align: center;
      background: var(--gold);
      color: var(--dark-green);
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 14px;
      transition: background 0.2s;
    }
    .watch-live-btn:hover { background: var(--gold-light); }

    .cut-line-bar {
      background: rgba(251,191,36,0.12);
      border: 1px solid rgba(251,191,36,0.35);
      border-radius: 7px;
      padding: 8px 14px;
      margin-bottom: 10px;
      font-size: 0.75rem;
      color: #fbbf24;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 1px;
    }
    .cut-line-bar .cut-score {
      font-weight: 700;
      font-size: 0.9rem;
    }

    .at-risk-badge {
      font-size: 0.58rem;
      background: rgba(251,191,36,0.2);
      color: #fbbf24;
      border: 1px solid rgba(251,191,36,0.4);
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 1px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .g-status.proj-miss { color: #fbbf24; }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.5);
    }
    .spin {
      display: inline-block;
      font-size: 2rem;
      animation: spin 1.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.22);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      background: var(--dark-green);
      border-bottom: 2px solid rgba(201,168,76,0.25);
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }
    .tab-btn:hover { color: rgba(255,255,255,0.8); }

    /* ── FULL LEADERBOARD ── */
    .lb-row {
      display: grid;
      grid-template-columns: 44px 40px 1fr 64px 64px 64px 64px 72px;
      align-items: center;
      padding: 9px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.82rem;
    }
    .lb-row:hover { background: rgba(255,255,255,0.04); }
    .lb-row.lb-header {
      font-size: 0.6rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold);
      border-bottom: 1px solid rgba(201,168,76,0.25);
      padding: 8px 16px;
    }
    .lb-row.lb-cut-line {
      background: rgba(251,191,36,0.08);
      border-top: 1px dashed rgba(251,191,36,0.4);
      border-bottom: 1px dashed rgba(251,168,36,0.4);
      color: #fbbf24;
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      justify-items: center;
    }
    .lb-row.lb-cut { opacity: 0.4; }
    .lb-row.lb-pool-pick { background: rgba(201,168,76,0.07); }

    .lb-pos  { color: var(--gold); font-weight: 700; font-family: 'Playfair Display', serif; }
    .lb-flag { font-size: 0.8rem; }
    .lb-name { font-weight: 500; display: flex; align-items: center; gap: 7px; }
    .lb-pool-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--gold); flex-shrink: 0;
      display: inline-block;
    }
    .lb-score { text-align: right; font-weight: 700; }
    .lb-score.under { color: var(--red); }
    .lb-score.over  { color: var(--blue); }
    .lb-round { text-align: right; color: rgba(255,255,255,0.5); font-size: 0.75rem; }
    .lb-round.under { color: var(--red); }
    .lb-round.over  { color: var(--blue); }
    .lb-thru  { text-align: right; color: rgba(255,255,255,0.4); font-size: 0.72rem; }
    .lb-status { text-align: right; font-size: 0.62rem; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.35); }
    .lb-status.active { color: #4ade80; }
    .lb-status.cut    { color: var(--red); }

    .lb-group-header {
      background: rgba(201,168,76,0.12);
      border-top: 1px solid rgba(201,168,76,0.25);
      border-bottom: 1px solid rgba(201,168,76,0.1);
      padding: 7px 16px;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .lb-group-header .hole-badge {
      background: var(--green);
      color: #fff;
      font-size: 0.6rem;
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: 1px;
    }

    /* ── FULL LEADERBOARD — compact 6-col layout ── */
    #full-leaderboard .lb-row {
      grid-template-columns: 44px 28px 1fr 64px 56px 64px;
    }

    /* ── MOBILE ── */
    @media (max-width: 560px) {
      .header-title { font-size: 1.4rem; letter-spacing: 5px; }
      .table-header  { grid-template-columns: 36px 1fr 58px 80px; }
      .card-row      { grid-template-columns: 36px 1fr 58px 80px; }
      .golfer-row, .golfer-list-header { grid-template-columns: 18px 1fr 50px 50px 58px; padding-left: 38px; }
      #full-leaderboard .lb-row { grid-template-columns: 36px 22px 1fr 52px 44px 56px; font-size: 0.76rem; padding: 8px 10px; }
    }
  </style>
</head>
<body>

<header>
  <img
    class="header-logo"
    src="Masters_(1).svg"
    alt="The Masters"
    onerror="this.style.display='none'; document.getElementById('header-fallback').style.display='block';"
  >
  <div id="header-fallback" style="display:none">
    <div class="header-flag">⛳</div>
    <div class="header-title">The Masters</div>
  </div>
  <div class="header-sub">2026 &nbsp;·&nbsp; Augusta National &nbsp;·&nbsp; Pool Standings</div>
  <div class="refresh-bar">
    <span id="last-updated">Fetching scores...</span>
    <button class="refresh-btn" onclick="fetchScores()">↻ Refresh</button>
  </div>
</header>

<div class="status-bar" id="status-bar">&nbsp;</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('pool')"        id="tab-pool">Pool Standings</button>
  <button class="tab-btn"        onclick="switchTab('teetimes')"    id="tab-teetimes">Tee Times</button>
  <button class="tab-btn"        onclick="switchTab('leaderboard')" id="tab-leaderboard">Full Leaderboard</button>
</div>

<main>
  <div id="view-pool">
    <div id="standings">
      <div class="loading">
        <div class="spin">⛳</div>
        <div>Loading leaderboard...</div>
      </div>
    </div>
  </div>
  <div id="view-teetimes" style="display:none">
    <div id="tee-times-board">
      <div class="loading">
        <div class="spin">⛳</div>
        <div>Loading tee times...</div>
      </div>
    </div>
  </div>
  <div id="view-leaderboard" style="display:none">
    <div id="full-leaderboard">
      <div class="loading">
        <div class="spin">⛳</div>
        <div>Loading leaderboard...</div>
      </div>
    </div>
  </div>
</main>

<footer>Auto-refreshes every 60 s &nbsp;·&nbsp; Scores via ESPN</footer>

function mastersLink(fullName) {
  const id = MASTERS_IDS[norm(fullName)];
  return id
    ? `https://www.masters.com/en_US/players/player_${id}.html?promo=bio_players`
    : null;
}
let leaderboard   = {};   // normalizedName -> player data
let idMap         = {};   // athleteId -> normalizedName (for ID-based lookup)
let pickIdCache   = {};   // pickName -> athleteId (built on first successful match)
let tourneyPhase  = 'pre';
let cutLineScore  = null;

// ============================================================
//  FETCH
// ============================================================
async function fetchScores() {
  document.getElementById('last-updated').textContent = 'Refreshing...';
  try {
    const res  = await fetch(ESPN_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // Navigate ESPN structure
    const events = (data.sports?.[0]?.leagues?.[0]?.events) || data.events || [];
    if (!events.length) throw new Error('No events');

    // Prefer Masters; fallback to first event
    const ev = events.find(e => /master/i.test(e.name)) || events[0];
    const competitors = ev.competitions?.[0]?.competitors || [];

    // Tournament phase
    const statusName = ev.status?.type?.name || '';
    tourneyPhase = /pre|scheduled/i.test(statusName) ? 'pre'
                 : /post|final/i.test(statusName)    ? 'post'
                 : 'in';

    // Build lookup
    leaderboard = {};
    idMap = {};
    for (const c of competitors) {
      const fullName  = c.athlete?.displayName || '';
      const athleteId = c.athlete?.id || '';
      if (!fullName) continue;

      // Score: use displayValue (e.g. "-10", "E", "+3") — NOT the raw score object
      const scoreRaw = c.score?.displayValue ?? c.score ?? null;
      const scoreNum = parseScore(scoreRaw);

      const statusDesc = (c.status?.type?.description || '').toLowerCase();
      const statusN    = (c.status?.type?.name || '').toLowerCase();
      const isCut = statusN.includes('cut') || statusDesc.includes('cut')
                 || statusN.includes('wd')  || statusDesc.includes('withdraw');

      // Round scores + per-round tee times from linescores
      const rounds = (c.linescores || []).map(ls => {
        const v = ls.displayValue ?? (ls.value !== undefined ? String(ls.value) : '');
        const score = (!v || v === '-' || v === '--' || v === '0') ? null : v;
        const tee   = ls.teeTime ? formatTeeTime(ls.teeTime) : null;
        return { score, teeTime: tee };
      });

      // Tee time — convert ISO timestamp to PT
      const teeDisplay = c.status?.teeTime ? formatTeeTime(c.status.teeTime) : null;

      const thru      = c.status?.thru ?? null;
      const headshot  = c.athlete?.headshot?.href || null;
      const teeTimeRaw = c.status?.teeTime || null;
      const startHole  = c.status?.startHole || 1;

      const key = norm(fullName);
      const playerData = {
        fullName,
        athleteId,
        score:    scoreNum,
        scoreStr: fmtScore(scoreNum),
        position: c.status?.position?.displayName || '',
        status:   isCut ? 'cut' : (tourneyPhase === 'post' ? 'fin' : 'active'),
        rounds,
        teeTime:    teeDisplay,
        teeTimeRaw,
        startHole,
        thru,
        headshot,
      };

      leaderboard[key] = playerData;
      if (athleteId) idMap[athleteId] = key;
    }

    // Projected cut line: top 50 + ties (only relevant during rounds 1-2)
    cutLineScore = null;
    if (tourneyPhase === 'in') {
      const activeSorted = Object.values(leaderboard)
        .filter(p => p.status === 'active' && p.score !== null)
        .sort((a, b) => a.score - b.score);
      if (activeSorted.length >= 50) {
        cutLineScore = activeSorted[49].score;
      }
    }

    document.getElementById('status-bar').textContent =
      `${ev.name || 'Masters'}  ·  ${competitors.length} players  ·  ${phaseLabel()}`;
    document.getElementById('last-updated').textContent =
      `Updated ${new Date().toLocaleTimeString()}`;

    render();
    if (activeTab === 'teetimes')    renderTeeTimes();
    if (activeTab === 'leaderboard') renderFullLeaderboard();
  } catch (err) {
    console.error(err);
    document.getElementById('last-updated').textContent =
      `Error — ${new Date().toLocaleTimeString()}`;
    document.getElementById('status-bar').textContent =
      'Live scoring unavailable — showing pool picks only';
    leaderboard = {};
    render();
  }
}

function phaseLabel() {
  return tourneyPhase === 'pre'  ? 'Tournament not yet started'
       : tourneyPhase === 'post' ? 'Tournament complete'
       : 'In progress';
}

// ============================================================
//  NAME UTILITIES
// ============================================================
function norm(name) {
  return (name || '').toLowerCase()
    .replace(/ø/g, 'o').replace(/æ/g, 'ae').replace(/å/g, 'a')  // Scandinavian letters
    .replace(/ð/g, 'd').replace(/þ/g, 'th').replace(/ß/g, 'ss') // others
    .replace(/['\u2019\u2018]/g, '')                              // apostrophes -> remove
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z\s]/g, '').replace(/\s+/g, ' ').trim();
}

function findGolfer(pick) {
  if (!pick) return null;

  // ID cache hit — most reliable once we've seen this player before
  if (pickIdCache[pick]) {
    const key = idMap[pickIdCache[pick]];
    if (key && leaderboard[key]) return leaderboard[key];
  }

  const n = norm(pick);

  // Exact name match
  if (leaderboard[n]) {
    if (leaderboard[n].athleteId) pickIdCache[pick] = leaderboard[n].athleteId;
    return leaderboard[n];
  }

  const parts    = n.split(' ');
  const lastName = parts[parts.length - 1];
  const firstLet = parts[0]?.[0];

  // Last name + first initial
  for (const [key, val] of Object.entries(leaderboard)) {
    const kp = key.split(' ');
    if (kp[kp.length - 1] === lastName && kp[0]?.[0] === firstLet) {
      if (val.athleteId) pickIdCache[pick] = val.athleteId;
      return val;
    }
  }

  // Last name only
  for (const [key, val] of Object.entries(leaderboard)) {
    if (key.endsWith(' ' + lastName) || key === lastName) {
      if (val.athleteId) pickIdCache[pick] = val.athleteId;
      return val;
    }
  }

  return null;
}

// ============================================================
//  SCORE UTILITIES
// ============================================================
function parseScore(s) {
  if (s === null || s === undefined) return null;
  const str = String(s).trim();
  if (!str || str === '-' || str === '--') return null;
  if (str === 'E' || str.toLowerCase() === 'even') return 0;
  const n = parseInt(str, 10);
  return isNaN(n) ? null : n;
}

function fmtScore(n) {
  if (n === null || n === undefined) return '—';
  if (n === 0) return 'E';
  return n > 0 ? '+' + n : '' + n;
}

function scoreClass(n) {
  if (n === null || n === undefined) return 'even';
  if (n < 0) return 'under';
  if (n > 0) return 'over';
  return 'even';
}

function formatTeeTime(raw) {
  if (!raw) return null;
  try {
    const d = new Date(raw);
    if (isNaN(d)) return raw;
    return d.toLocaleTimeString('en-US', {
      hour: 'numeric',
      minute: '2-digit',
      timeZone: 'America/Los_Angeles',
      timeZoneName: 'short'
    });
  } catch { return raw; }
}

function getBroadcastDay() {
  const now = new Date();
  const toMins = str => { const [h, m] = str.split(':').map(Number); return h * 60 + m; };

  const dateKey = now.toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
  const hhmm = now.toLocaleTimeString('en-US', {
    timeZone: 'America/Los_Angeles', hour: '2-digit', minute: '2-digit', hour12: false
  });
  const nowMins = toMins(hhmm);

  const day = BROADCAST_SCHEDULE[dateKey];

  // If today is a tournament day, return it with active block flagged
  if (day) {
    const blocks = day.blocks.map(b => ({
      ...b,
      active: nowMins >= toMins(b.start) && nowMins < toMins(b.end),
      done:   nowMins >= toMins(b.end),
    }));
    return { round: day.round, blocks, isToday: true };
  }

  // Not a tournament day — find next upcoming day
  const dates = Object.keys(BROADCAST_SCHEDULE).sort();
  const upcoming = dates.find(d => d > dateKey);
  if (upcoming) {
    const next = BROADCAST_SCHEDULE[upcoming];
    const label = new Date(upcoming + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    return { round: next.round, blocks: next.blocks.map(b => ({ ...b, active: false, done: false })), isToday: false, upcomingLabel: label };
  }

  return null;
}

// ============================================================
//  STANDINGS CALCULATION
// ============================================================
function calcStandings() {
  const rows = POOL.map(p => {
    // Resolve each pick against the live leaderboard
    const golfers = p.picks.map(pick => {
      if (!pick) return null;
      const data = findGolfer(pick);
      const score = data?.score ?? null;
      const projMissCut = cutLineScore !== null && score !== null
        && data?.status === 'active' && score > cutLineScore;
      return {
        pick,
        displayName: data ? data.fullName : pick,
        score,
        scoreStr: data?.scoreStr ?? (tourneyPhase === 'pre' ? '—' : '?'),
        position: data?.position ?? '',
        status:   data?.status  ?? 'pre',
        isCut:    data?.status === 'cut',
        projMissCut,
        rounds:    data?.rounds    ?? [],
        teeTime:   data?.teeTime   ?? null,
        thru:      data?.thru      ?? null,
        headshot:  data?.headshot  ?? null,
        athleteId: data?.athleteId ?? null,
      };
    });

    const realPicks    = golfers.filter(Boolean);
    const pendingCount = golfers.filter(g => g === null).length;
    const madeCut      = realPicks.filter(g => !g.isCut);
    const missedCut    = realPicks.filter(g => g.isCut);

    // Elimination: only apply once all 4 picks are in AND cut has happened
    const allPicksIn   = pendingCount === 0;
    const cutHappened  = tourneyPhase !== 'pre' && Object.values(leaderboard).some(v => v.status === 'cut');
    const eliminated   = allPicksIn && cutHappened && madeCut.length < 3;

    // Best 3 of non-cut golfers (lowest score = best)
    const scorable   = madeCut.filter(g => g.score !== null);
    const sorted     = [...scorable].sort((a, b) => a.score - b.score);
    const top3       = sorted.slice(0, 3);
    const top3Names  = new Set(top3.map(g => g.pick));
    realPicks.forEach(g => { g.counted = top3Names.has(g.pick) && !g.isCut; });

    const hasLive    = top3.length > 0 && tourneyPhase !== 'pre';
    const totalScore = eliminated ? null : (hasLive ? top3.reduce((s, g) => s + g.score, 0) : null);

    const projAtRisk = realPicks.filter(g => g.projMissCut).length;

    // Tiebreaker = 4th golfer's score (the dropped one)
    const fourth = sorted.length > 3 ? sorted[3] : null;
    const tiebreakerScore = fourth ? fourth.score : null;

    return {
      name: p.name,
      golfers: realPicks,
      pendingCount,
      totalScore,
      tiebreakerScore,
      eliminated,
      madeCutCount: madeCut.length,
      top3,
      projAtRisk,
    };
  });

  return rows.sort((a, b) => {
    if (a.eliminated && !b.eliminated) return 1;
    if (!a.eliminated && b.eliminated) return -1;
    if (a.totalScore === null && b.totalScore !== null) return 1;
    if (a.totalScore !== null && b.totalScore === null) return -1;
    if (a.totalScore === null && b.totalScore === null) return a.name.localeCompare(b.name);
    if (a.totalScore !== b.totalScore) return a.totalScore - b.totalScore;
    // Tiebreaker: 4th golfer score
    if (a.tiebreakerScore !== null && b.tiebreakerScore !== null) return a.tiebreakerScore - b.tiebreakerScore;
    if (a.tiebreakerScore !== null) return -1;
    if (b.tiebreakerScore !== null) return 1;
    return 0;
  });
}

function render() {
  const standings = calcStandings();
  const el        = document.getElementById('standings');

  let html = '';

  html += `
    <a href="https://www.masters.com/en_US/live/index.html" target="_blank" class="watch-live-btn">
      ▶ Watch Live
    </a>`;

  if (tourneyPhase === 'pre') {
    html += `
      <div class="pre-banner">
        <div class="icon">🌿</div>
        <h3>Tournament Begins Thursday</h3>
        <p>All picks are locked in. Live scores will appear when play begins at Augusta National.</p>
      </div>`;
  }

  if (cutLineScore !== null) {
    html += `
      <div class="cut-line-bar">
        ✂ &nbsp;Projected Cut Line: <span class="cut-score">${fmtScore(cutLineScore)}</span>
        &nbsp;·&nbsp; Top 50 + ties make the cut &nbsp;·&nbsp; Rounds 1–2 only
      </div>`;
  }

  html += `
    <div class="table-header">
      <div>POS</div><div>PARTICIPANT</div>
      <div>SCORE</div><div>CUT STATUS</div>
    </div>`;

  // Two-pass position labeling so ties are correct from the start
  const _scores = standings.map(p => (!p.eliminated && p.totalScore !== null) ? p.totalScore : null);
  const posLabels = _scores.map((score, i) => {
    if (score === null) return '—';
    const firstIdx  = _scores.findIndex(s => s === score);
    const rawPos    = _scores.slice(0, firstIdx).filter(s => s !== null).length + 1;
    const isTie     = _scores.filter(s => s === score).length > 1;
    return isTie ? 'T' + rawPos : String(rawPos);
  });

  standings.forEach((p, idx) => {
    const isLeader = idx === 0 && !p.eliminated && p.totalScore !== null;
    const posLabel = posLabels[idx];

    const cardClass  = p.eliminated ? 'eliminated' : (isLeader ? 'leader' : '');
    const scoreNum   = p.totalScore;
    const scoreCls   = p.eliminated ? 'out'
                     : scoreNum === null ? 'dash'
                     : scoreClass(scoreNum);
    const scoreDisp  = p.eliminated ? 'OUT'
                     : scoreNum === null ? '—'
                     : fmtScore(scoreNum);

    const badges = [];
    if (p.eliminated)   badges.push(`<span class="out-badge">Eliminated</span>`);
    if (p.pendingCount) badges.push(`<span class="pending-badge">${p.pendingCount} pick${p.pendingCount > 1 ? 's' : ''} pending</span>`);
    if (!p.eliminated && p.projAtRisk > 0) badges.push(`<span class="at-risk-badge">⚠ ${p.projAtRisk} proj. miss cut</span>`);

    const cutText = p.pendingCount
      ? `${p.golfers.length}/4 picks in`
      : `${p.madeCutCount}/4 made cut`;

    // Golfer rows
    const gRows = p.golfers.map(g => {
      const rowCls = g.isCut ? 'cut-row' : (g.counted ? 'counted' : '');
      const check  = g.counted ? `<span style="color:var(--gold)">✓</span>`
                   : g.isCut  ? `<span style="color:var(--red)">✗</span>`
                   :            `<span style="color:rgba(255,255,255,0.2)">·</span>`;
      const sCls   = g.score !== null ? scoreClass(g.score) : '';
      const stCls  = g.status === 'cut'   ? 'cut'
                   : g.projMissCut        ? 'proj-miss'
                   : g.status === 'active'? 'active'
                   : g.status === 'fin'   ? 'fin' : 'pre';
      const stLbl  = g.status === 'cut'    ? 'CUT'
                   : g.projMissCut        ? 'PROJ MISS'
                   : g.status === 'fin'   ? 'F'
                   : g.status === 'active'? 'LIVE'
                   : '';

      const thruTxt = g.thru == 18 ? 'F' : (g.thru > 0 ? `Thru ${g.thru}` : '');
      const headshotHtml = g.headshot
        ? `<img class="g-headshot" src="${g.headshot}" alt="${g.displayName}" onerror="this.style.display='none'">`
        : '';

      // Round score pills — always show all 4 rounds, pad if API returns fewer
      const roundLabels = ['R1','R2','R3','R4'];
      const paddedRounds = [0,1,2,3].map(i => g.rounds[i] || { score: null, teeTime: null });
      const roundsHtml = paddedRounds.map((r, i) => {
        const label = roundLabels[i];
        const scoreStr = r.score
          ? (() => { const n = parseScore(r.score); const cls = n < 0 ? 'under' : n > 0 ? 'over' : ''; return `<span class="r-val ${cls}">${r.score}</span>`; })()
          : `<span class="r-val">—</span>`;
        return `<span>${label}: ${scoreStr}</span>`;
      }).join('');

      // Next tee time: find first round without a score
      const nextRoundIdx = paddedRounds.findIndex(r => !r.score);
      const nextTee = nextRoundIdx !== -1 ? paddedRounds[nextRoundIdx]?.teeTime : null;
      const nextLabel = nextRoundIdx !== -1 ? (roundLabels[nextRoundIdx] || `R${nextRoundIdx+1}`) : null;
      const teeHtml = nextTee
        ? `<span class="tee-time">⏱ ${nextLabel} ${nextTee}</span>`
        : '';

      const subRow = (roundsHtml || teeHtml)
        ? `<div class="g-rounds">${roundsHtml}${teeHtml}</div>`
        : '';

      return `
        <div class="golfer-row ${rowCls}">
          <div class="g-check">${check}</div>
          <div class="g-name">
            ${headshotHtml}
            <div class="g-name-text">
              <a href="${mastersLink(g.displayName) || (g.athleteId ? `https://www.espn.com/golf/player/scorecards/_/id/${g.athleteId}` : '#')}" target="_blank" style="color:inherit;text-decoration:none;border-bottom:1px dotted rgba(255,255,255,0.25);cursor:pointer">${g.displayName}</a>
              ${thruTxt ? `<span class="g-thru">${thruTxt}</span>` : ''}
              ${subRow}
            </div>
          </div>
          <div class="g-score ${sCls}">${g.scoreStr}</div>
          <div class="g-pos">${g.position}</div>
          <div class="g-status ${stCls}">${stLbl}</div>
        </div>`;
    }).join('');

    const pendingRows = p.pendingCount
      ? `<div class="pending-row">+ ${p.pendingCount} pick${p.pendingCount > 1 ? 's' : ''} not yet submitted</div>`
      : '';

    html += `
      <div class="card ${cardClass}">
        <div class="card-row" onclick="toggle(${idx})">
          <div class="pos" id="pos-${idx}">${posLabel}</div>
          <div class="pname">${p.name}${badges.join('')}</div>
          <div class="score-total ${scoreCls}">${scoreDisp}</div>
          <div class="cut-detail">${cutText}</div>
        </div>
        <div class="golfer-list" id="gl-${idx}">
          <div class="golfer-list-header">
            <div></div><div>GOLFER</div><div>SCORE</div><div>POS</div><div>STATUS</div>
          </div>
          ${gRows}
          ${pendingRows}
        </div>
      </div>`;
  });

  el.innerHTML = html;
}

}

function renderTeeTimes() {
  const el = document.getElementById('tee-times-board');
  if (!Object.keys(leaderboard).length) {
    el.innerHTML = '<div class="loading"><div class="spin">⛳</div><div>No data yet</div></div>';
    return;
  }

  // All pool picks (for gold dot highlighting + owner lookup)
  const poolPicks = new Set(
    POOL.flatMap(p => p.picks.filter(Boolean).map(n => norm(n)))
  );

  // Reverse lookup: normalized name -> array of participant names
  const pickOwners = {};
  POOL.forEach(p => {
    p.picks.filter(Boolean).forEach(pick => {
      const key = norm(pick);
      if (!pickOwners[key]) pickOwners[key] = [];
      pickOwners[key].push(p.name);
    });
  });

  const players = Object.values(leaderboard);

  // Group by tee time
  const groups = {};
  const noTee = [];
  players.forEach(p => {
    if (p.teeTimeRaw) {
      if (!groups[p.teeTimeRaw]) groups[p.teeTimeRaw] = [];
      groups[p.teeTimeRaw].push(p);
    } else {
      noTee.push(p);
    }
  });

  // Sort groups by time
  const sortedTimes = Object.keys(groups).sort((a, b) => new Date(a) - new Date(b));

  const rCell = (r) => {
    if (!r || !r.score) return `<div class="lb-round">—</div>`;
    const n = parseScore(r.score);
    const c = n < 0 ? 'under' : n > 0 ? 'over' : '';
    return `<div class="lb-round ${c}">${r.score}</div>`;
  };

  const playerRow = (p) => {
    const isCut      = p.status === 'cut';
    const isPoolPick = poolPicks.has(norm(p.fullName));
    const sCls       = scoreClass(p.score);
    const rounds     = [0,1,2,3].map(i => p.rounds[i] || null);
    const dot        = isPoolPick ? '<span class="lb-pool-dot" title="Pool pick"></span>' : '<span style="width:7px;display:inline-block"></span>';
    const thruTxt    = p.status === 'fin' ? '· F' : (p.thru == 18 ? '· F' : (p.thru > 0 && p.status === 'active' ? `· Thru ${p.thru}` : ''));
    const posTxt     = p.position ? p.position : (isCut ? 'CUT' : '—');
    const owners     = pickOwners[norm(p.fullName)] || [];
    const ownersHtml = owners.length
      ? `<div style="font-size:0.62rem;color:var(--gold);margin-top:2px;opacity:0.85">${owners.join(', ')}</div>`
      : '';

    return `
      <div class="lb-row ${isCut ? 'lb-cut' : ''} ${isPoolPick && !isCut ? 'lb-pool-pick' : ''}">
        <div class="lb-pos">${posTxt}</div>
        <div class="lb-flag">${dot}</div>
        <div class="lb-name">
          ${p.headshot ? `<img class="g-headshot" src="${p.headshot}" alt="" onerror="this.style.display='none'">` : ''}
          <div>
            <a href="${mastersLink(p.fullName) || `https://www.espn.com/golf/player/scorecards/_/id/${p.athleteId}`}" target="_blank" style="color:inherit;text-decoration:none;border-bottom:1px dotted rgba(255,255,255,0.3);cursor:pointer" title="View scorecard on ESPN">
              ${p.fullName}
            </a>
            <span style="font-size:0.65rem;color:rgba(255,255,255,0.35)"> ${thruTxt}</span>
            ${ownersHtml}
          </div>
        </div>
        <div class="lb-score ${sCls}">${p.scoreStr}</div>
        ${rCell(rounds[0])}
        ${rCell(rounds[1])}
        ${rCell(rounds[2])}
        ${rCell(rounds[3])}
      </div>`;
  };

  let html = broadcastBannerHtml() + `
    <div class="lb-row lb-header">
      <div>POS</div>
      <div></div>
      <div>PLAYER</div>
      <div style="text-align:right">TOT</div>
      <div style="text-align:right">R1</div>
      <div style="text-align:right">R2</div>
      <div style="text-align:right">R3</div>
      <div style="text-align:right">R4</div>
    </div>`;

  sortedTimes.forEach(time => {
    const group     = groups[time];
    const formatted = formatTeeTime(time);
    const hole      = group[0]?.startHole || 1;
    const holeLbl   = hole === 1 ? 'Hole 1' : `Hole ${hole}`;

    html += `
      <div class="lb-group-header">
        ⏱ ${formatted}
        <span class="hole-badge">${holeLbl}</span>
      </div>`;

    group.forEach(p => { html += playerRow(p); });
  });

  // Players with no tee time
  if (noTee.length) {
    html += `<div class="lb-group-header" style="color:rgba(255,255,255,0.3)">No Tee Time</div>`;
    noTee.forEach(p => { html += playerRow(p); });
  }

  el.innerHTML = html;
}

// ============================================================
//  FULL LEADERBOARD RENDER (sorted by score)
// ============================================================
function renderFullLeaderboard() {
  const el = document.getElementById('full-leaderboard');
  if (!Object.keys(leaderboard).length) {
    el.innerHTML = '<div class="loading"><div class="spin">⛳</div><div>No data yet</div></div>';
    return;
  }

  const poolPicks = new Set(POOL.flatMap(p => p.picks.filter(Boolean).map(n => norm(n))));
  const pickOwners = {};
  POOL.forEach(p => p.picks.filter(Boolean).forEach(pick => {
    const key = norm(pick);
    if (!pickOwners[key]) pickOwners[key] = [];
    pickOwners[key].push(p.name);
  }));

  const players = Object.values(leaderboard).sort((a, b) => {
    if (a.status === 'cut' && b.status !== 'cut') return 1;
    if (a.status !== 'cut' && b.status === 'cut') return -1;
    return (a.score ?? 999) - (b.score ?? 999);
  });

  let html = `
    <div class="lb-row lb-header">
      <div>POS</div><div></div><div>PLAYER</div>
      <div style="text-align:right">TOT</div>
      <div style="text-align:right">THRU</div>
      <div style="text-align:right">TODAY</div>
    </div>`;

  let cutLineDrawn = false;
  let pos = 1; let prevScore = null; let tieStart = 1;

  players.forEach(p => {
    if (!cutLineDrawn && cutLineScore !== null && p.score !== null && p.score > cutLineScore && p.status !== 'cut') {
      html += `<div class="lb-row lb-cut-line" style="grid-column:1/-1;padding:6px 16px">✂ &nbsp; Projected Cut Line &nbsp; ${fmtScore(cutLineScore)}</div>`;
      cutLineDrawn = true;
    }
    if (!cutLineDrawn && p.status === 'cut' && tourneyPhase === 'post') {
      html += `<div class="lb-row lb-cut-line" style="grid-column:1/-1;padding:6px 16px">✂ &nbsp; Cut</div>`;
      cutLineDrawn = true;
    }

    const isCut      = p.status === 'cut';
    const isPoolPick = poolPicks.has(norm(p.fullName));
    const owners     = pickOwners[norm(p.fullName)] || [];
    const ownersHtml = owners.length ? `<div style="font-size:0.62rem;color:var(--gold);margin-top:2px;opacity:0.85">${owners.join(', ')}</div>` : '';
    const sCls       = scoreClass(p.score);
    const dot        = isPoolPick ? '<span class="lb-pool-dot"></span>' : '<span style="width:7px;display:inline-block"></span>';

    // Thru display
    const thruDisp = (p.status === 'fin' || p.thru == 18) ? 'F'
                   : p.thru > 0 ? String(p.thru)
                   : '—';

    // Today's score = last round that has a score
    const paddedR = [0,1,2,3].map(i => p.rounds[i] || { score: null, teeTime: null });
    let todayScore = null;
    for (let i = 3; i >= 0; i--) {
      if (paddedR[i].score !== null) { todayScore = paddedR[i].score; break; }
    }
    const todayNum = parseScore(todayScore);
    const todayCls = todayNum !== null ? (todayNum < 0 ? 'under' : todayNum > 0 ? 'over' : '') : '';
    const todayDisp = todayScore ?? '—';

    // Next tee time (for players not yet started)
    const nextRIdx = paddedR.findIndex(r => !r.score);
    const nextTee  = nextRIdx !== -1 ? paddedR[nextRIdx]?.teeTime : null;
    const nextRLbl = nextRIdx !== -1 ? `R${nextRIdx + 1}` : null;
    const teeHtml  = nextTee ? `<div style="font-size:0.62rem;color:#60a5fa;margin-top:2px">⏱ ${nextRLbl} ${nextTee}</div>` : '';

    let posLabel = isCut ? 'CUT' : '';
    if (!isCut) {
      if (p.score === null) {
        posLabel = '—';
      } else {
        posLabel = p.score === prevScore ? 'T' + tieStart : String(pos);
        if (p.score !== prevScore) tieStart = pos;
        prevScore = p.score; pos++;
      }
    }

    html += `
      <div class="lb-row ${isCut ? 'lb-cut' : ''} ${isPoolPick && !isCut ? 'lb-pool-pick' : ''}">
        <div class="lb-pos">${posLabel}</div>
        <div class="lb-flag">${dot}</div>
        <div class="lb-name">
          <div>
            <a href="${mastersLink(p.fullName) || `https://www.espn.com/golf/player/scorecards/_/id/${p.athleteId}`}" target="_blank" style="color:inherit;text-decoration:none;border-bottom:1px dotted rgba(255,255,255,0.3);cursor:pointer">
              ${p.fullName}
            </a>
            ${teeHtml}
            ${ownersHtml}
          </div>
        </div>
        <div class="lb-score ${sCls}">${p.scoreStr}</div>
        <div class="lb-thru">${thruDisp}</div>
        <div class="lb-round ${todayCls}">${todayDisp}</div>
      </div>`;
  });

  el.innerHTML = html;
}
